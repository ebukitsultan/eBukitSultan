<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>eBukitSultan - Warga Blok B</title>
  
  <!-- ============================================================
  PWA MANIFEST
  ============================================================ -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eBukitSultan">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- ============================================================
  GOOGLE FONT - INTER
  ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       RESET & FULLSCREEN
    ============================================================ */
    * {
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box !important;
    }

    html, body {
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
      background: #FFFFFF !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
    }

    /* ============================================================
       SPLASH SCREEN
    ============================================================ */
    #splash-screen {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      z-index: 9999 !important;
      background: #FFFFFF !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      transition: opacity 0.8s ease, transform 0.8s ease !important;
      opacity: 1 !important;
    }

    #splash-screen.hidden {
      opacity: 0 !important;
      transform: scale(1.05) !important;
      pointer-events: none !important;
    }

    .splash-container {
      text-align: center !important;
      padding: 30px !important;
      animation: fadeIn 0.6s ease !important;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .splash-logo {
      width: 120px !important;
      height: 120px !important;
      border-radius: 28px !important;
      object-fit: cover !important;
      background: #FFFFFF !important;
      padding: 12px !important;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08) !important;
      margin-bottom: 20px !important;
    }

    .splash-title {
      font-size: 32px !important;
      font-weight: 800 !important;
      color: #0F172A !important;
    }

    .splash-title span {
      color: #4F46E5 !important;
    }

    .splash-subtitle {
      font-size: 14px !important;
      font-weight: 500 !important;
      color: #94A3B8 !important;
      margin-top: 4px !important;
      margin-bottom: 24px !important;
    }

    .loading-spinner {
      display: inline-block !important;
      width: 32px !important;
      height: 32px !important;
      border: 3px solid #E2E8F0 !important;
      border-top-color: #4F46E5 !important;
      border-radius: 50% !important;
      animation: spin 0.8s linear infinite !important;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px !important;
      color: #94A3B8 !important;
      margin-top: 12px !important;
    }

    .splash-footer {
      font-size: 11px !important;
      color: #94A3B8 !important;
      margin-top: 40px !important;
    }

    .splash-footer .heart {
      color: #EF4444 !important;
    }

    .splash-footer .developer {
      color: #4F46E5 !important;
      font-weight: 700 !important;
    }

    /* ============================================================
       IFRAME - FULL LAYAR
    ============================================================ */
    #appIframe {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      width: 100% !important;
      height: 100% !important;
      border: none !important;
      margin: 0 !important;
      padding: 0 !important;
      display: block !important;
      background: #F1F5F9 !important;
      z-index: 1 !important;
      opacity: 0 !important;
      transition: opacity 0.5s ease !important;
    }

    #appIframe.loaded {
      opacity: 1 !important;
    }

    /* ============================================================
       DESKTOP MODE
    ============================================================ */
    @media (min-width: 769px) {
      body {
        background: #E8ECF1 !important;
        padding: 20px !important;
      }
      #appIframe {
        max-width: 480px !important;
        max-height: 95vh !important;
        border-radius: 20px !important;
        box-shadow: 0 8px 40px rgba(0,0,0,0.12) !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        width: 100% !important;
        height: 90vh !important;
        min-height: 600px !important;
      }
    }

    /* ============================================================
       RESPONSIVE HP
    ============================================================ */
    @media (max-width: 480px) {
      .splash-logo {
        width: 90px !important;
        height: 90px !important;
        padding: 10px !important;
      }
      .splash-title {
        font-size: 26px !important;
      }
      .splash-subtitle {
        font-size: 12px !important;
      }
      .splash-footer {
        font-size: 10px !important;
      }
    }

    /* ============================================================
       CHROME HP - TOUCH OVERFLOW FIX
    ============================================================ */
    @supports (-webkit-touch-callout: none) {
      html, body, #appIframe {
        min-height: -webkit-fill-available !important;
        max-height: -webkit-fill-available !important;
      }
    }

    /* ============================================================
       SEMBUNYIKAN SCROLL BAR
    ============================================================ */
    ::-webkit-scrollbar {
      width: 0px !important;
      height: 0px !important;
      display: none !important;
    }
    * {
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
    }
  </style>
</head>
<body>

  <!-- ============================================================
  SPLASH SCREEN
  ============================================================ -->
  <div id="splash-screen">
    <div class="splash-container">
      <img src="icons/icon-512.png" class="splash-logo" alt="eBukitSultan Logo">
      <div class="splash-title">eBukit<span>Sultan</span></div>
      <div class="splash-subtitle">Amanah Dalam Kelola · Transparan Dalam Data</div>
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">Memuat aplikasi...</div>
      <div class="splash-footer">
        Developed With <span class="heart">❤️</span> By <span class="developer">AF-AHFZB2NO2</span>
      </div>
    </div>
  </div>

  <!-- ============================================================
  IFRAME APLIKASI
  ============================================================ -->
  <iframe 
    id="appIframe"
    src="https://script.google.com/macros/s/AKfycbyXMuqwTDMThOtmY2Z28l8rTQvCRh3UMQhfR2a0rDQBauetzAvWL0dpxGHWZEiWXFMj/exec"
    allowfullscreen="true"
    loading="lazy"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"
    allow="geolocation; microphone; camera; midi; encrypted-media; *">
  </iframe>

  <script>
    // ============================================================
    // SPLASH SCREEN - HIDE AFTER IFRAME LOAD
    // ============================================================
    var splashScreen = document.getElementById('splash-screen');
    var iframe = document.getElementById('appIframe');
    var loadingText = document.getElementById('loadingText');

    // Update loading text
    var loadingMessages = ['Memuat aplikasi...', 'Menyiapkan data...', 'Hampir selesai...'];
    var messageIndex = 0;

    var messageInterval = setInterval(function() {
      messageIndex = (messageIndex + 1) % loadingMessages.length;
      if (loadingText) {
        loadingText.textContent = loadingMessages[messageIndex];
      }
    }, 2000);

    // ============================================================
    // IFRAME LOAD HANDLER
    // ============================================================
    if (iframe) {
      // Sukses load
      iframe.addEventListener('load', function() {
        clearInterval(messageInterval);
        if (loadingText) {
          loadingText.textContent = 'Selesai!';
        }
        iframe.classList.add('loaded');
        setTimeout(function() {
          splashScreen.classList.add('hidden');
          setTimeout(function() {
            splashScreen.style.display = 'none';
          }, 900);
        }, 500);
      });

      // Error load
      iframe.addEventListener('error', function() {
        clearInterval(messageInterval);
        if (loadingText) {
          loadingText.textContent = '⚠️ Gagal memuat, coba refresh';
        }
        // Tetap tampilkan iframe meskipun error
        iframe.classList.add('loaded');
        setTimeout(function() {
          splashScreen.classList.add('hidden');
          setTimeout(function() {
            splashScreen.style.display = 'none';
          }, 900);
        }, 1000);
      });

      // Fallback: hilangkan splash setelah 7 detik
      setTimeout(function() {
        clearInterval(messageInterval);
        if (loadingText) {
          loadingText.textContent = 'Memuat...';
        }
        iframe.classList.add('loaded');
        splashScreen.classList.add('hidden');
        setTimeout(function() {
          splashScreen.style.display = 'none';
        }, 900);
      }, 7000);
    }

    // ============================================================
    // FULLSCREEN
    // ============================================================
    function requestFullscreen(element) {
      if (!element) return;
      try {
        if (element.requestFullscreen) {
          element.requestFullscreen();
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      } catch (err) {
        console.log('Fullscreen tidak diizinkan:', err.message);
      }
    }

    var fullscreenAttempted = false;

    document.addEventListener('click', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    document.addEventListener('touchstart', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    // ============================================================
    // INSTALL APP (PWA)
    // ============================================================
    var deferredPrompt;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      console.log('📲 Install prompt available');
    });

    // ============================================================
    // SERVICE WORKER
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js')
          .then(function(reg) {
            console.log('✅ Service Worker registered');
          })
          .catch(function(err) {
            console.warn('⚠️ Service Worker registration failed:', err);
          });
      });
    }

    console.log('✅ eBukitSultan wrapper loaded!');
    console.log('🔄 Iframe URL:', iframe ? iframe.src : 'No iframe');
  </script>
</body>
</html>
