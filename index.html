<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>eBukitSultan</title>
  <style>
    /* ============================================================
       RESET TOTAL - TANPA RUANG KOSONG
    ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #F1F5F9;
    }

    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #F1F5F9;
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* ============================================================
       IFRAME - FULL LAYAR TANPA RUANG KOSONG
    ============================================================ */
    iframe {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      max-width: 100vw;
      border: none;
      margin: 0;
      padding: 0;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #F1F5F9;
      z-index: 1;
      overflow: hidden;
    }

    /* ============================================================
       CHROME HP - TOUCH OVERFLOW FIX
    ============================================================ */
    @supports (-webkit-touch-callout: none) {
      html, body, iframe {
        min-height: -webkit-fill-available;
      }
      body {
        height: -webkit-fill-available;
      }
    }

    /* ============================================================
       FIREFOX HP - FIX
    ============================================================ */
    @-moz-document url-prefix() {
      html, body, iframe {
        min-height: 100vh;
      }
    }

    /* ============================================================
       LANDSCAPE HP - TETAP FULL
    ============================================================ */
    @media (orientation: landscape) and (max-height: 600px) {
      html, body, iframe {
        min-height: 100vh;
        min-height: 100dvh;
      }
    }

    /* ============================================================
       SEMBUNYIKAN SCROLL BAR
    ============================================================ */
    ::-webkit-scrollbar {
      width: 0px;
      height: 0px;
      background: transparent;
      display: none;
    }
    ::-webkit-scrollbar-track { background: transparent; display: none; }
    ::-webkit-scrollbar-thumb { background: transparent; display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    /* ============================================================
       LOADING - PREVENT WHITE FLASH
    ============================================================ */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #F1F5F9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(79, 70, 229, 0.1);
      border-top: 4px solid #4F46E5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      margin-top: 16px;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Memuat eBukitSultan...</div>
  </div>

  <!-- IFRAME APLIKASI -->
  <iframe 
    id="appIframe"
    src="https://script.google.com/macros/s/AKfycbzHtg6IpiyDxMHT6fNZA893LP1K4i966JQ4iCZ1r0cVz_wpx-xSYtSKjfN3Yo0fYbef/exec"
    allowfullscreen="true"
    loading="lazy">
  </iframe>

  <script>
    // ============================================================
    // HILANGKAN LOADING SETELAH IFRAME LOAD
    // ============================================================
    var iframe = document.getElementById('appIframe');
    var loadingOverlay = document.getElementById('loadingOverlay');

    if (iframe) {
      // Saat iframe selesai load, hilangkan loading
      iframe.addEventListener('load', function() {
        setTimeout(function() {
          loadingOverlay.classList.add('hidden');
        }, 300);
      });

      // Fallback: jika iframe terlalu lama, hilangkan loading setelah 5 detik
      setTimeout(function() {
        loadingOverlay.classList.add('hidden');
      }, 5000);
    }

    // ============================================================
    // FULLSCREEN - HANYA SAAT USER KLIK (KEBIJAKAN BROWSER)
    // ============================================================
    document.addEventListener('click', function() {
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement) {
        try {
          if (iframeEl.requestFullscreen) {
            iframeEl.requestFullscreen();
          } else if (iframeEl.webkitRequestFullscreen) {
            iframeEl.webkitRequestFullscreen();
          }
        } catch (err) {
          console.log('Fullscreen tidak diizinkan:', err.message);
        }
      }
    }, { once: true });

    // ============================================================
    // COBA FULLSCREEN SAAT LOAD (MUNGKIN DIBLOKIR BROWSER)
    // ============================================================
    window.addEventListener('load', function() {
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && document.fullscreenEnabled) {
        try {
          if (iframeEl.requestFullscreen) {
            iframeEl.requestFullscreen().catch(function() {});
          } else if (iframeEl.webkitRequestFullscreen) {
            iframeEl.webkitRequestFullscreen();
          }
        } catch (err) {
          console.log('Auto fullscreen gagal (diblokir browser):', err.message);
        }
      }
    });
  </script>

</body>
</html>
