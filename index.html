<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <title>eBukitSultan</title>
  <style>
    /* ============================================================
       RESET TOTAL - TANPA RUANG KOSONG
    ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #F1F5F9;
    }

    body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      max-height: 100vh;
      max-height: -webkit-fill-available;
      max-height: 100dvh;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #F1F5F9;
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* ============================================================
       IFRAME - FULL LAYAR TANPA RUANG KOSONG
    ============================================================ */
    iframe {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      min-height: 100dvh;
      max-height: 100vh;
      max-height: -webkit-fill-available;
      max-height: 100dvh;
      max-width: 100vw;
      border: none;
      margin: 0;
      padding: 0;
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #F1F5F9;
      z-index: 1;
      overflow: hidden;
      /* Prevent iframe scroll */
      overflow-y: hidden;
      overflow-x: hidden;
    }

    /* ============================================================
       CHROME HP - TOUCH OVERFLOW FIX
    ============================================================ */
    @supports (-webkit-touch-callout: none) {
      html, body, iframe {
        min-height: -webkit-fill-available;
        max-height: -webkit-fill-available;
      }
      body {
        height: -webkit-fill-available;
      }
      iframe {
        height: -webkit-fill-available;
        min-height: -webkit-fill-available;
        max-height: -webkit-fill-available;
      }
    }

    /* ============================================================
       FIREFOX HP - FIX
    ============================================================ */
    @-moz-document url-prefix() {
      html, body, iframe {
        min-height: 100vh;
        max-height: 100vh;
      }
    }

    /* ============================================================
       LANDSCAPE HP - TETAP FULL
    ============================================================ */
    @media (orientation: landscape) and (max-height: 600px) {
      html, body, iframe {
        min-height: 100vh;
        min-height: 100dvh;
        max-height: 100vh;
        max-height: 100dvh;
      }
    }

    /* ============================================================
       PORTRAIT HP - FULL FIT
    ============================================================ */
    @media (orientation: portrait) and (max-width: 480px) {
      html, body, iframe {
        min-height: 100vh;
        min-height: -webkit-fill-available;
        min-height: 100dvh;
        max-height: 100vh;
        max-height: -webkit-fill-available;
        max-height: 100dvh;
      }
      iframe {
        height: 100dvh;
        min-height: 100dvh;
        max-height: 100dvh;
      }
    }

    /* ============================================================
       SEMBUNYIKAN SCROLL BAR
    ============================================================ */
    ::-webkit-scrollbar {
      width: 0px;
      height: 0px;
      background: transparent;
      display: none;
    }
    ::-webkit-scrollbar-track { background: transparent; display: none; }
    ::-webkit-scrollbar-thumb { background: transparent; display: none; }
    * { scrollbar-width: none; -ms-overflow-style: none; }

    /* ============================================================
       LOADING - PREVENT WHITE FLASH
    ============================================================ */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #F1F5F9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(79, 70, 229, 0.1);
      border-top: 4px solid #4F46E5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      margin-top: 16px;
      font-family: 'Inter', -apple-system, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #475569;
      letter-spacing: 0.5px;
    }

    /* ============================================================
       KEYBOARD OPEN - ADJUST HEIGHT (CHROME HP)
    ============================================================ */
    @media (max-width: 480px) and (orientation: portrait) {
      .keyboard-open iframe {
        height: 100vh !important;
        min-height: 100vh !important;
        max-height: 100vh !important;
      }
    }
  </style>
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Memuat eBukitSultan...</div>
  </div>

  <!-- IFRAME APLIKASI -->
  <iframe 
    id="appIframe"
    src="https://script.google.com/macros/s/AKfycbxD-gkBbvrp8HoLAZxG_5IsKi2oUu3bfZkvs4R1aglzGiuobJqwpvoWEwHQCTTZZeP9/exec"
    allowfullscreen="true"
    loading="lazy"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals">
  </iframe>

  <script>
    // ============================================================
    // HILANGKAN LOADING SETELAH IFRAME LOAD
    // ============================================================
    var iframe = document.getElementById('appIframe');
    var loadingOverlay = document.getElementById('loadingOverlay');

    if (iframe) {
      iframe.addEventListener('load', function() {
        setTimeout(function() {
          loadingOverlay.classList.add('hidden');
        }, 300);
      });

      // Fallback: hilangkan loading setelah 5 detik
      setTimeout(function() {
        loadingOverlay.classList.add('hidden');
      }, 5000);
    }

    // ============================================================
    // FULLSCREEN - SAAT USER KLIK ATAU TAP
    // ============================================================
    function requestFullscreen(element) {
      if (!element) return;
      try {
        if (element.requestFullscreen) {
          element.requestFullscreen();
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      } catch (err) {
        console.log('Fullscreen tidak diizinkan:', err.message);
      }
    }

    // Fullscreen saat tap/klik (user gesture)
    var fullscreenAttempted = false;

    document.addEventListener('click', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    document.addEventListener('touchstart', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    // ============================================================
    // COBA FULLSCREEN SAAT LOAD (MUNGKIN DIBLOKIR BROWSER)
    // ============================================================
    window.addEventListener('load', function() {
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && document.fullscreenEnabled) {
        setTimeout(function() {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            requestFullscreen(iframeEl);
          }
        }, 800);
      }
    });

    // ============================================================
    // DETEKSI KEYBOARD OPEN - ADJUST IFRAME (CHROME HP)
    // ============================================================
    if ('visualViewport' in window) {
      var initialHeight = window.visualViewport.height;
      var isKeyboardOpen = false;

      window.visualViewport.addEventListener('resize', function() {
        var currentHeight = window.visualViewport.height;
        var iframeEl = document.getElementById('appIframe');
        
        if (currentHeight < initialHeight * 0.7) {
          // Keyboard terbuka
          isKeyboardOpen = true;
          if (iframeEl) {
            iframeEl.style.height = '100vh';
            iframeEl.style.minHeight = '100vh';
            iframeEl.style.maxHeight = '100vh';
          }
        } else if (isKeyboardOpen && currentHeight >= initialHeight * 0.85) {
          // Keyboard tertutup
          isKeyboardOpen = false;
          if (iframeEl) {
            iframeEl.style.height = '';
            iframeEl.style.minHeight = '';
            iframeEl.style.maxHeight = '';
          }
        }
      });
    }

    // ============================================================
    // ORIENTATION CHANGE - REFRESH HEIGHT
    // ============================================================
    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        var iframeEl = document.getElementById('appIframe');
        if (iframeEl) {
          iframeEl.style.height = '100%';
          iframeEl.style.minHeight = '100vh';
          iframeEl.style.maxHeight = '100vh';
        }
        // Reset fullscreen attempt on orientation change
        fullscreenAttempted = false;
      }, 400);
    });

    // ============================================================
    // RESIZE WINDOW - REFRESH HEIGHT
    // ============================================================
    window.addEventListener('resize', function() {
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !isKeyboardOpen) {
        iframeEl.style.height = '100%';
        iframeEl.style.minHeight = '100vh';
        iframeEl.style.maxHeight = '100vh';
      }
    });

    // ============================================================
    // PREVENT IFRAME SCROLL
    // ============================================================
    if (iframe) {
      iframe.addEventListener('load', function() {
        try {
          // Prevent scrolling inside iframe
          var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          if (iframeDoc) {
            iframeDoc.body.style.overflow = 'hidden';
            iframeDoc.documentElement.style.overflow = 'hidden';
          }
        } catch (e) {
          // Cross-origin, ignore
        }
      });
    }
  </script>

</body>
</html>
