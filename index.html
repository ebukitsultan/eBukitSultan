<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <title>eBukitSultan</title>
  <style>
    /* ============================================================
       RESET TOTAL - TANPA RUANG KOSONG
    ============================================================ */
    * {
      margin: 0 !important;
      padding: 0 !important;
      box-sizing: border-box !important;
    }

    html {
      width: 100% !important;
      height: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      background: #F1F5F9 !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
    }

    body {
      width: 100% !important;
      height: 100% !important;
      min-height: 100vh !important;
      min-height: -webkit-fill-available !important;
      min-height: 100dvh !important;
      max-height: 100vh !important;
      max-height: -webkit-fill-available !important;
      max-height: 100dvh !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      background: #F1F5F9 !important;
      display: flex !important;
      justify-content: center !important;
      align-items: center !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
    }

    /* ============================================================
       IFRAME - FULL LAYAR TANPA RUANG KOSONG
    ============================================================ */
    iframe {
      width: 100% !important;
      height: 100% !important;
      min-height: 100vh !important;
      min-height: -webkit-fill-available !important;
      min-height: 100dvh !important;
      max-height: 100vh !important;
      max-height: -webkit-fill-available !important;
      max-height: 100dvh !important;
      max-width: 100vw !important;
      border: none !important;
      margin: 0 !important;
      padding: 0 !important;
      display: block !important;
      position: absolute !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      background: #F1F5F9 !important;
      z-index: 1 !important;
      overflow: hidden !important;
    }

    /* ============================================================
       CHROME HP - TOUCH OVERFLOW FIX
    ============================================================ */
    @supports (-webkit-touch-callout: none) {
      html, body, iframe {
        min-height: -webkit-fill-available !important;
        max-height: -webkit-fill-available !important;
      }
      body {
        height: -webkit-fill-available !important;
      }
      iframe {
        height: -webkit-fill-available !important;
        min-height: -webkit-fill-available !important;
        max-height: -webkit-fill-available !important;
      }
    }

    /* ============================================================
       FIREFOX HP - FIX
    ============================================================ */
    @-moz-document url-prefix() {
      html, body, iframe {
        min-height: 100vh !important;
        max-height: 100vh !important;
      }
    }

    /* ============================================================
       PORTRAIT HP - FULL FIT
    ============================================================ */
    @media (orientation: portrait) and (max-width: 480px) {
      html, body, iframe {
        min-height: 100vh !important;
        min-height: -webkit-fill-available !important;
        min-height: 100dvh !important;
        max-height: 100vh !important;
        max-height: -webkit-fill-available !important;
        max-height: 100dvh !important;
      }
      iframe {
        height: 100dvh !important;
        min-height: 100dvh !important;
        max-height: 100dvh !important;
      }
    }

    /* ============================================================
       LANDSCAPE HP - TETAP FULL
    ============================================================ */
    @media (orientation: landscape) and (max-height: 600px) {
      html, body, iframe {
        min-height: 100vh !important;
        min-height: 100dvh !important;
        max-height: 100vh !important;
        max-height: 100dvh !important;
      }
      iframe {
        height: 100dvh !important;
        min-height: 100dvh !important;
        max-height: 100dvh !important;
      }
    }

    /* ============================================================
       SEMBUNYIKAN SCROLL BAR
    ============================================================ */
    ::-webkit-scrollbar {
      width: 0px !important;
      height: 0px !important;
      background: transparent !important;
      display: none !important;
    }
    ::-webkit-scrollbar-track { display: none !important; }
    ::-webkit-scrollbar-thumb { display: none !important; }
    * { scrollbar-width: none !important; -ms-overflow-style: none !important; }

    /* ============================================================
       LOADING - PREVENT WHITE FLASH
    ============================================================ */
    .loading-overlay {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      background: #F1F5F9 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      z-index: 9999 !important;
      transition: opacity 0.5s ease !important;
    }
    .loading-overlay.hidden {
      opacity: 0 !important;
      pointer-events: none !important;
    }
    .loading-spinner {
      width: 48px !important;
      height: 48px !important;
      border: 4px solid rgba(79, 70, 229, 0.1) !important;
      border-top: 4px solid #4F46E5 !important;
      border-radius: 50% !important;
      animation: spin 0.8s linear infinite !important;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      margin-top: 16px !important;
      font-family: 'Inter', -apple-system, sans-serif !important;
      font-size: 14px !important;
      font-weight: 600 !important;
      color: #475569 !important;
      letter-spacing: 0.5px !important;
    }

    /* ============================================================
       DESKTOP MODE - TETAP RAPI
    ============================================================ */
    @media (min-width: 769px) {
      body {
        background: #E8ECF1 !important;
        padding: 20px !important;
        align-items: center !important;
        justify-content: center !important;
        position: relative !important;
      }
      iframe {
        max-width: 480px !important;
        border-radius: 20px !important;
        box-shadow: 0 8px 40px rgba(0,0,0,0.12) !important;
        position: relative !important;
        height: 90vh !important;
        min-height: 600px !important;
        max-height: 95vh !important;
      }
    }

    /* ============================================================
       SAFE AREA UNTUK IPHONE NOTCH
    ============================================================ */
    @supports (padding: max(0px)) {
      body {
        padding-left: max(12px, env(safe-area-inset-left)) !important;
        padding-right: max(12px, env(safe-area-inset-right)) !important;
        padding-top: max(12px, env(safe-area-inset-top)) !important;
        padding-bottom: max(12px, env(safe-area-inset-bottom)) !important;
      }
    }

    /* ============================================================
       KEYBOARD OPEN - ADJUST IFRAME (CHROME HP)
    ============================================================ */
    @media (max-width: 480px) and (orientation: portrait) {
      .keyboard-open iframe {
        height: 100vh !important;
        min-height: 100vh !important;
        max-height: 100vh !important;
      }
    }
  </style>
</head>
<body>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Memuat eBukitSultan...</div>
  </div>

  <!-- IFRAME APLIKASI -->
  <iframe 
    id="appIframe"
    src="https://script.google.com/macros/s/AKfycbwvGMt5DFh5csrVfkDthV5wZJQ4utJK069M4lUhcPOa62Ai49I5rjAaOAiznPUfBYGX/exec"
    allowfullscreen="true"
    loading="lazy"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads">
  </iframe>

  <script>
    // ============================================================
    // HILANGKAN LOADING SETELAH IFRAME LOAD
    // ============================================================
    var iframe = document.getElementById('appIframe');
    var loadingOverlay = document.getElementById('loadingOverlay');

    if (iframe) {
      iframe.addEventListener('load', function() {
        setTimeout(function() {
          loadingOverlay.classList.add('hidden');
        }, 300);
      });

      // Fallback: hilangkan loading setelah 5 detik
      setTimeout(function() {
        loadingOverlay.classList.add('hidden');
      }, 5000);

      // Jika iframe gagal load, hilangkan loading juga
      iframe.addEventListener('error', function() {
        loadingOverlay.classList.add('hidden');
      });
    }

    // ============================================================
    // FULLSCREEN - SAAT USER KLIK ATAU TAP
    // ============================================================
    function requestFullscreen(element) {
      if (!element) return;
      try {
        if (element.requestFullscreen) {
          element.requestFullscreen();
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      } catch (err) {
        console.log('Fullscreen tidak diizinkan:', err.message);
      }
    }

    var fullscreenAttempted = false;

    document.addEventListener('click', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    document.addEventListener('touchstart', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    // ============================================================
    // COBA FULLSCREEN SAAT LOAD
    // ============================================================
    window.addEventListener('load', function() {
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && document.fullscreenEnabled) {
        setTimeout(function() {
          if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            requestFullscreen(iframeEl);
          }
        }, 800);
      }
    });

    // ============================================================
    // DETEKSI KEYBOARD OPEN - ADJUST IFRAME
    // ============================================================
    if ('visualViewport' in window) {
      var initialHeight = window.visualViewport.height;
      var isKeyboardOpen = false;

      window.visualViewport.addEventListener('resize', function() {
        var currentHeight = window.visualViewport.height;
        var iframeEl = document.getElementById('appIframe');
        
        if (currentHeight < initialHeight * 0.7) {
          // Keyboard terbuka
          isKeyboardOpen = true;
          if (iframeEl) {
            iframeEl.style.height = '100vh';
            iframeEl.style.minHeight = '100vh';
            iframeEl.style.maxHeight = '100vh';
          }
        } else if (isKeyboardOpen && currentHeight >= initialHeight * 0.85) {
          // Keyboard tertutup
          isKeyboardOpen = false;
          if (iframeEl) {
            iframeEl.style.height = '';
            iframeEl.style.minHeight = '';
            iframeEl.style.maxHeight = '';
          }
        }
      });
    }

    // ============================================================
    // ORIENTATION CHANGE - REFRESH HEIGHT
    // ============================================================
    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        var iframeEl = document.getElementById('appIframe');
        if (iframeEl) {
          iframeEl.style.height = '100%';
          iframeEl.style.minHeight = '100vh';
          iframeEl.style.maxHeight = '100vh';
        }
        fullscreenAttempted = false;
      }, 400);
    });

    // ============================================================
    // RESIZE WINDOW - REFRESH HEIGHT
    // ============================================================
    window.addEventListener('resize', function() {
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !isKeyboardOpen) {
        iframeEl.style.height = '100%';
        iframeEl.style.minHeight = '100vh';
        iframeEl.style.maxHeight = '100vh';
      }
    });

    // ============================================================
    // PREVENT IFRAME SCROLL
    // ============================================================
    if (iframe) {
      iframe.addEventListener('load', function() {
        try {
          var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          if (iframeDoc) {
            iframeDoc.body.style.overflow = 'hidden';
            iframeDoc.documentElement.style.overflow = 'hidden';
            // Hapus padding/margin yang mungkin ada di dalam iframe
            iframeDoc.body.style.margin = '0';
            iframeDoc.body.style.padding = '0';
          }
        } catch (e) {
          // Cross-origin, ignore
          console.log('Tidak bisa mengakses iframe content (cross-origin)');
        }
      });
    }

    // ============================================================
    // HIDE BANNER GOOGLE APPS SCRIPT (jika ada)
    // ============================================================
    if (iframe) {
      iframe.addEventListener('load', function() {
        try {
          var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          if (iframeDoc) {
            var banners = iframeDoc.querySelectorAll('#docs-banner, .docs-banner, .docs-banner-container, div[role="banner"]');
            banners.forEach(function(el) {
              el.style.display = 'none';
              el.style.visibility = 'hidden';
              el.style.height = '0';
              el.style.overflow = 'hidden';
            });
          }
        } catch (e) {
          // Cross-origin, ignore
        }
      });
    }

    console.log('✅ eBukitSultan wrapper loaded successfully!');
    console.log('📱 Device: ' + (navigator.userAgent || 'Unknown'));
    console.log('🔄 Iframe URL: ' + (iframe ? iframe.src : 'No iframe'));
  </script>

</body>
</html>
