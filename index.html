  <style>

    /* ============================================================

    #splash-screen.hidden {

    .splash-content {

    @keyframes splashFadeIn {

    /* ============================================================

    @media (min-width: 769px) {

<body>

  <!-- ============================================================
  SPLASH SCREEN - HTML LOADING
  ============================================================ -->
  <div id="splash-screen">
    <div class="splash-content">
      <img src="icons/icon-512.png" class="splash-logo" alt="eBukitSultan Logo">
      <div class="splash-title">eBukit<span>Sultan</span></div>
      <div class="splash-subtitle">Amanah Dalam Kelola · Transparan Dalam Data</div>
      
      <div class="loading-bar-container">
        <div class="loading-bar-progress"></div>
      </div>
      <div class="loading-text" id="loadingText">Memuat aplikasi...</div>
      
      <div class="splash-footer">
        Developed With <span class="heart">❤️</span> By <span class="developer">AF-AHFZB2NO2</span>
      </div>
    </div>
  </div>

  <!-- ============================================================
  IFRAME APLIKASI
  ============================================================ -->
  <iframe 
    id="appIframe"
    src="https://script.google.com/macros/s/AKfycbwoH0vmcC50igWS7LvfR7bYkbnrwGHl82BFHxq5y8MlkzeFKO9DBLrc93wsVOwISJaK/exec"
    allowfullscreen="true"
    loading="lazy"
    scrolling="no"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads">
  </iframe>

  <!-- ============================================================
  BUTTON INSTALL
  ============================================================ -->
  <button id="btnInstall" onclick="installApp()">📲 Install Aplikasi</button>

  <script>
    // ============================================================
    // SPLASH SCREEN - HIDE AFTER IFRAME LOAD
    // ============================================================
    var splashScreen = document.getElementById('splash-screen');
    var iframe = document.getElementById('appIframe');
    var loadingText = document.getElementById('loadingText');

    // Update loading text
    var loadingMessages = [
      'Memuat aplikasi...',
      'Menyiapkan data...',
      'Hampir selesai...'
    ];
    var messageIndex = 0;

    var messageInterval = setInterval(function() {
      messageIndex = (messageIndex + 1) % loadingMessages.length;
      if (loadingText) {
        loadingText.textContent = loadingMessages[messageIndex];
      }
    }, 2000);

    if (iframe) {
      // Ketika iframe selesai load
      iframe.addEventListener('load', function() {
        clearInterval(messageInterval);
        if (loadingText) {
          loadingText.textContent = 'Selesai!';
        }
        
        // Tampilkan iframe
        iframe.classList.add('loaded');
        
        // Sembunyikan splash screen
        setTimeout(function() {
          splashScreen.classList.add('hidden');
          // Hapus splash screen dari DOM setelah transisi
          setTimeout(function() {
            splashScreen.style.display = 'none';
          }, 900);
        }, 500);
      });

      // Fallback: hilangkan splash setelah 6 detik
      setTimeout(function() {
        clearInterval(messageInterval);
        if (loadingText) {
          loadingText.textContent = 'Memuat...';
        }
        iframe.classList.add('loaded');
        splashScreen.classList.add('hidden');
        setTimeout(function() {
          splashScreen.style.display = 'none';
        }, 900);
      }, 6000);

      // Jika iframe gagal load
      iframe.addEventListener('error', function() {
        clearInterval(messageInterval);
        if (loadingText) {
          loadingText.textContent = 'Gagal memuat, coba refresh';
        }
        iframe.classList.add('loaded');
        setTimeout(function() {
          splashScreen.classList.add('hidden');
          setTimeout(function() {
            splashScreen.style.display = 'none';
          }, 900);
        }, 1000);
      });
    }

    // ============================================================
    // FULLSCREEN
    // ============================================================
    function requestFullscreen(element) {
      if (!element) return;
      try {
        if (element.requestFullscreen) {
          element.requestFullscreen();
        } else if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
        } else if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      } catch (err) {
        console.log('Fullscreen tidak diizinkan:', err.message);
      }
    }

    var fullscreenAttempted = false;

    document.addEventListener('click', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    document.addEventListener('touchstart', function() {
      if (fullscreenAttempted) return;
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !document.fullscreenElement && !document.webkitFullscreenElement) {
        fullscreenAttempted = true;
        requestFullscreen(iframeEl);
      }
    });

    // ============================================================
    // DETEKSI KEYBOARD OPEN
    // ============================================================
    if ('visualViewport' in window) {
      var initialHeight = window.visualViewport.height;
      var isKeyboardOpen = false;

      window.visualViewport.addEventListener('resize', function() {
        var currentHeight = window.visualViewport.height;
        var iframeEl = document.getElementById('appIframe');
        
        if (currentHeight < initialHeight * 0.7) {
          isKeyboardOpen = true;
          if (iframeEl) {
            iframeEl.style.height = '100vh';
            iframeEl.style.minHeight = '100vh';
            iframeEl.style.maxHeight = '100vh';
          }
        } else if (isKeyboardOpen && currentHeight >= initialHeight * 0.85) {
          isKeyboardOpen = false;
          if (iframeEl) {
            iframeEl.style.height = '';
            iframeEl.style.minHeight = '';
            iframeEl.style.maxHeight = '';
          }
        }
      });
    }

    // ============================================================
    // ORIENTATION CHANGE
    // ============================================================
    window.addEventListener('orientationchange', function() {
      setTimeout(function() {
        var iframeEl = document.getElementById('appIframe');
        if (iframeEl) {
          iframeEl.style.height = '100%';
          iframeEl.style.minHeight = '100vh';
          iframeEl.style.maxHeight = '100vh';
        }
        fullscreenAttempted = false;
      }, 400);
    });

    // ============================================================
    // RESIZE WINDOW
    // ============================================================
    window.addEventListener('resize', function() {
      var iframeEl = document.getElementById('appIframe');
      if (iframeEl && !isKeyboardOpen) {
        iframeEl.style.height = '100%';
        iframeEl.style.minHeight = '100vh';
        iframeEl.style.maxHeight = '100vh';
      }
    });

    // ============================================================
    // INSTALL APP
    // ============================================================
    var deferredPrompt;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      var btn = document.getElementById('btnInstall');
      if (btn) btn.classList.add('show');
    });

    function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(result) {
        if (result.outcome === 'accepted') {
          console.log('Aplikasi berhasil diinstall');
        }
        deferredPrompt = null;
        var btn = document.getElementById('btnInstall');
        if (btn) btn.classList.remove('show');
      });
    }

    // ============================================================
    // SERVICE WORKER
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js')
          .then(function() { console.log('Service Worker berhasil didaftarkan'); })
          .catch(function(err) { console.error('Gagal mendaftarkan Service Worker', err); });
      });
    }

    console.log('✅ eBukitSultan wrapper loaded successfully!');
    console.log('📱 Device: ' + (navigator.userAgent || 'Unknown'));
    console.log('🔄 Iframe URL: ' + (iframe ? iframe.src : 'No iframe'));
  </script>
</body>
