<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBukitSultan - Warga Blok B</title>
  
  <!-- ============================================================
  PWA MANIFEST
  ============================================================ -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="eBukitSultan">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <!-- ============================================================
  GOOGLE FONT - INTER
  ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FFFFFF;
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .splash-container {
      text-align: center;
      padding: 30px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .splash-logo {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      object-fit: cover;
      background: #FFFFFF;
      padding: 12px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    .splash-title {
      font-size: 32px;
      font-weight: 800;
      color: #0F172A;
    }

    .splash-title span {
      color: #4F46E5;
    }

    .splash-subtitle {
      font-size: 14px;
      font-weight: 500;
      color: #94A3B8;
      margin-top: 4px;
      margin-bottom: 24px;
    }

    .loading-spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #E2E8F0;
      border-top-color: #4F46E5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: #94A3B8;
      margin-top: 12px;
    }

    .splash-footer {
      font-size: 11px;
      color: #94A3B8;
      margin-top: 40px;
    }

    .splash-footer .heart {
      color: #EF4444;
    }

    .splash-footer .developer {
      color: #4F46E5;
      font-weight: 700;
    }

    .btn-redirect {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 32px;
      background: #4F46E5;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .btn-redirect:active {
      transform: scale(0.95);
    }

    /* ============================================================
       DESKTOP MODE
    ============================================================ */
    @media (min-width: 769px) {
      body {
        background: #E8ECF1;
        padding: 20px;
      }
      .splash-container {
        background: #FFFFFF;
        padding: 50px 60px;
        border-radius: 24px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.1);
        max-width: 480px;
      }
    }

    /* ============================================================
       RESPONSIVE HP
    ============================================================ */
    @media (max-width: 480px) {
      .splash-logo {
        width: 90px;
        height: 90px;
        padding: 10px;
      }
      .splash-title {
        font-size: 26px;
      }
      .splash-subtitle {
        font-size: 12px;
      }
      .splash-footer {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <!-- Logo -->
    <img src="icons/icon-512.png" class="splash-logo" alt="eBukitSultan Logo">
    
    <!-- Title -->
    <div class="splash-title">eBukit<span>Sultan</span></div>
    <div class="splash-subtitle">Amanah Dalam Kelola · Transparan Dalam Data</div>
    
    <!-- Loading Indicator -->
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">Mengarahkan ke aplikasi...</div>
    
    <!-- Fallback Button -->
    <a href="https://script.google.com/macros/s/AKfycbyXMuqwTDMThOtmY2Z28l8rTQvCRh3UMQhfR2a0rDQBauetzAvWL0dpxGHWZEiWXFMj/exec" class="btn-redirect" id="btnRedirect">
      🚀 Buka Aplikasi
    </a>
    
    <!-- Footer -->
    <div class="splash-footer">
      Developed With <span class="heart">❤️</span> By <span class="developer">AF-AHFZB2NO2</span>
    </div>
  </div>

  <script>
    // ============================================================
    // AUTO REDIRECT KE WEB APP (TANPA IFRAME)
    // ============================================================
    var WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyXMuqwTDMThOtmY2Z28l8rTQvCRh3UMQhfR2a0rDQBauetzAvWL0dpxGHWZEiWXFMj/exec';
    var loadingText = document.getElementById('loadingText');
    var btnRedirect = document.getElementById('btnRedirect');
    var redirectDelay = 1500; // 1.5 detik

    // Update loading text
    var messages = [
      'Mengarahkan ke aplikasi...',
      'Menyiapkan data...',
      'Hampir selesai...'
    ];
    var msgIndex = 0;

    var msgInterval = setInterval(function() {
      msgIndex = (msgIndex + 1) % messages.length;
      if (loadingText) {
        loadingText.textContent = messages[msgIndex];
      }
    }, 1200);

    // Redirect setelah delay
    setTimeout(function() {
      clearInterval(msgInterval);
      if (loadingText) {
        loadingText.textContent = 'Membuka aplikasi...';
      }
      
      // 🔥 METODE REDIRECT
      window.location.replace(WEB_APP_URL);
      
      // Fallback: jika redirect gagal, tampilkan tombol
      setTimeout(function() {
        if (btnRedirect) {
          btnRedirect.style.display = 'inline-block';
        }
        if (loadingText) {
          loadingText.textContent = 'Klik tombol untuk membuka aplikasi';
        }
      }, 3000);
    }, redirectDelay);

    // ============================================================
    // INSTALL APP (PWA)
    // ============================================================
    var deferredPrompt;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredPrompt = e;
      console.log('📲 Install prompt available');
    });

    // ============================================================
    // SERVICE WORKER
    // ============================================================
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('./service-worker.js')
          .then(function(reg) {
            console.log('✅ Service Worker registered');
          })
          .catch(function(err) {
            console.warn('⚠️ Service Worker registration failed:', err);
          });
      });
    }

    // ============================================================
    // DETEKSI FIREFOX & COOP
    // ============================================================
    var isFirefox = navigator.userAgent.toLowerCase().indexOf('firefox') > -1;
    if (isFirefox) {
      console.log('🦊 Firefox detected - using direct navigation');
      // Redirect lebih cepat di Firefox
      setTimeout(function() {
        window.location.replace(WEB_APP_URL);
      }, 500);
    }

    console.log('✅ eBukitSultan wrapper loaded!');
  </script>
</body>
</html>
